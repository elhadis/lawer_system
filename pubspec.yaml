name: lawer_system
description: "Legal ERP System - 100% Offline Arabic Law Office Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database & storage
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # Files
  file_picker: ^8.1.2
  open_filex: ^4.5.0
  share_plus: ^10.1.4

  # i18n & formatting
  intl: ^0.20.2

  # PDF / printing
  pdf: ^3.11.1
  printing: ^5.13.2

  # UI
  google_fonts: ^6.2.1

  # Offline licensing
  device_info_plus: ^11.5.0
  win32_registry: ^2.1.0
  shared_preferences: ^2.5.3
  crypto: ^3.0.6 # SHA256 (offline licensing)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: false
  ios: false
  image_path: images/logo.png
  windows:
    generate: true
    image_path: images/logo.png

flutter:
  uses-material-design: true
  assets:
    - images/logo.png
